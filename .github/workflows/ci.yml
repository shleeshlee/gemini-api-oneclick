name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python syntax check
        run: |
          python -m py_compile app/main.py scripts/generate_compose.py ops/channel_guard.py

      - name: Shell syntax check
        run: |
          bash -n scripts/install.sh scripts/healthcheck.sh ops/install_cron.sh

      - name: Compose generation check
        run: |
          cp .env.example .env
          cp envs/account.env.example envs/account1.env
          python scripts/generate_compose.py
          test -f docker-compose.accounts.yml
          grep -q "gemini-api-1" docker-compose.accounts.yml
