<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Gateway</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #FFF6EE;
  --bg-warm: #FFF0E3;
  --card: #FFFFFF;
  --card-hover: #FFF9F5;
  --primary: #FF8B7E;
  --primary-light: #FFB5AD;
  --primary-dark: #E06B5E;
  --accent: #FFD166;
  --accent-light: #FFE4A0;
  --success: #6EC89B;
  --success-light: #D4F0E1;
  --danger: #FF7B7B;
  --danger-light: #FFD4D4;
  --warn: #FFB347;
  --warn-light: #FFE4B5;
  --text: #3D3535;
  --text-muted: #9E8E8E;
  --text-light: #C4B0B0;
  --border: #F0E4DC;
  --shadow-sm: 0 2px 8px rgba(120, 80, 60, 0.06);
  --shadow-md: 0 4px 20px rgba(120, 80, 60, 0.08);
  --shadow-lg: 0 8px 40px rgba(120, 80, 60, 0.12);
  --radius: 16px;
  --radius-sm: 10px;
}

html { font-size: 15px; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 15% 25%, rgba(255,139,126,0.06) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(255,209,102,0.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(110,200,155,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* --- LOGIN --- */
.login-screen {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 1000;
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.login-screen.hidden { opacity: 0; transform: scale(1.02); pointer-events: none; }

.login-box {
  text-align: center; padding: 3rem 2.5rem;
  background: var(--card); border-radius: 24px;
  box-shadow: var(--shadow-lg); width: min(400px, 90vw);
  position: relative; overflow: hidden;
}
.login-box::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--primary), var(--accent), var(--success));
}
.login-icon { font-size: 3.5rem; margin-bottom: 0.8rem; display: block; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

.login-box h1 { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.6rem; color: var(--text); margin-bottom: 0.3rem; }
.login-box p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.8rem; }

.login-input {
  width: 100%; padding: 0.9rem 1.2rem; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'Outfit', sans-serif; font-size: 1rem;
  outline: none; transition: border-color 0.2s, box-shadow 0.2s; background: var(--bg);
}
.login-input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 4px rgba(255,139,126,0.1); }
.login-input::placeholder { color: var(--text-light); }

.login-btn {
  width: 100%; margin-top: 1rem; padding: 0.9rem;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white; border: none; border-radius: var(--radius-sm);
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.login-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,139,126,0.3); }
.login-btn:active { transform: translateY(0); }
.login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.8rem; min-height: 1.2rem; }

/* --- APP --- */
.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: none; }
.app.visible { display: block; animation: fadeUp 0.6s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

/* --- TOPBAR --- */
.topbar {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem;
  margin-bottom: 1.5rem; padding: 1rem 1.5rem;
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.topbar-left { display: flex; align-items: center; gap: 0.8rem; }
.topbar-logo { font-size: 1.8rem; }
.topbar-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.3rem; }
.topbar-sub { font-size: 0.8rem; color: var(--text-muted); }
.topbar-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

.stat-pill {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.35rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
}
.stat-pill.ok { background: var(--success-light); color: #2D7A52; }
.stat-pill.warn { background: var(--danger-light); color: #B94A4A; }
.stat-pill.disabled { background: var(--warn-light); color: #92610E; }

.btn-topbar {
  padding: 0.4rem 0.9rem; border-radius: 10px; border: 2px solid var(--border);
  background: var(--card); cursor: pointer; display: inline-flex; align-items: center;
  gap: 0.35rem; font-size: 0.8rem; font-family: 'Outfit', sans-serif; font-weight: 500;
  color: var(--text-muted); transition: all 0.15s; white-space: nowrap;
}
.btn-topbar:hover { border-color: var(--primary-light); background: var(--bg-warm); color: var(--text); }
.btn-topbar.spinning .icon { display: inline-block; animation: spin 0.8s linear infinite; }
.btn-topbar .icon { font-size: 0.95rem; line-height: 1; }
@keyframes spin { to { transform: rotate(360deg); } }

/* --- GRID --- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }

/* --- CARD --- */
.card {
  background: var(--card); border-radius: var(--radius); padding: 1.2rem;
  box-shadow: var(--shadow-sm); border: 2px solid transparent;
  cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden;
}
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--border); transition: background 0.2s;
}
.card.healthy::after { background: linear-gradient(90deg, var(--success), var(--accent)); }
.card.unhealthy::after { background: linear-gradient(90deg, var(--danger), var(--primary-light)); }
.card.disabled-card {
  background: #F3F0ED; opacity: 0.55; filter: grayscale(0.6);
}
.card.disabled-card::after { background: var(--text-light); }
.card.disabled-card:hover { opacity: 0.75; filter: grayscale(0.3); }
.card.no-cookie::after { background: linear-gradient(90deg, var(--danger), var(--primary-light)); }
.card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--border); }

.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.card-num { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--text); }
.card-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-status.green { background: var(--success); box-shadow: 0 0 8px rgba(110,200,155,0.4); }
.card-status.red { background: var(--danger); box-shadow: 0 0 8px rgba(255,123,123,0.4); animation: pulse 2s ease-in-out infinite; }
.card-status.yellow { background: var(--warn); }
.card-status.grey { background: var(--text-light); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.card-name { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
.card-port { font-size: 0.7rem; color: var(--text-light); font-family: 'SF Mono', 'Fira Code', monospace; }
.group-badge {
  display: inline-block; font-size: 0.68rem; font-weight: 600; padding: 0.1rem 0.5rem;
  border-radius: 10px; letter-spacing: 0.3px; text-transform: uppercase;
  font-family: 'Nunito', sans-serif;
}

.card-preview {
  font-size: 0.75rem; color: var(--text-light); font-family: 'SF Mono', 'Fira Code', monospace;
  background: var(--bg); padding: 0.35rem 0.6rem; border-radius: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-preview.empty { color: var(--danger); background: var(--danger-light); font-family: 'Outfit', sans-serif; }

.card-stats { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.3rem; }
.card-error {
  font-size: 0.7rem; color: var(--danger); background: var(--danger-light);
  padding: 0.2rem 0.5rem; border-radius: 6px; margin-top: 0.3rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-actions { margin-top: 0.4rem; display: flex; gap: 0.4rem; }
.card-btn {
  font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer; font-family: 'Outfit'; transition: all 0.15s;
}
.card-btn:hover { background: var(--bg-warm); border-color: var(--primary-light); }
.card-btn.enable { border-color: var(--success); color: #2D7A52; }
.card-btn.disable { border-color: var(--danger); color: #B94A4A; }

/* --- MODAL --- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(60, 40, 30, 0.3); backdrop-filter: blur(4px);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--card); border-radius: 20px; padding: 2rem;
  width: min(460px, 92vw); box-shadow: var(--shadow-lg);
  transform: translateY(20px) scale(0.97); transition: transform 0.3s ease;
  max-height: 90vh; overflow-y: auto;
}
.modal-overlay.active .modal { transform: translateY(0) scale(1); }

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.3rem; }
.modal-close {
  width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--bg);
  cursor: pointer; font-size: 1.1rem; display: flex; align-items: center;
  justify-content: center; transition: background 0.15s;
}
.modal-close:hover { background: var(--danger-light); }

.form-group { margin-bottom: 1.2rem; }
.form-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.85rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  background: var(--bg); color: var(--text);
}
.form-input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 4px rgba(255,139,126,0.08); }
.form-input::placeholder { color: var(--text-light); }
.form-input-name { font-family: 'Outfit', sans-serif; font-size: 0.95rem; }

.modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
.btn { flex: 1; padding: 0.85rem; border-radius: var(--radius-sm); border: none; font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.15s; }
.btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,139,126,0.3); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-ghost { background: var(--bg); color: var(--text-muted); border: 2px solid var(--border); }
.btn-ghost:hover { background: var(--bg-warm); }

.modal-msg { margin-top: 0.8rem; font-size: 0.85rem; min-height: 1.2rem; text-align: center; }
.modal-msg.ok { color: var(--success); }
.modal-msg.err { color: var(--danger); }

/* --- LOG PANEL --- */
.log-panel {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
  overflow: hidden; margin-bottom: 1.5rem;
}
.log-toggle {
  padding: 0.8rem 1.2rem; cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; user-select: none;
}
.log-toggle:hover { background: var(--bg-warm); }
.log-header {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.95rem;
  display: flex; align-items: center; gap: 0.5rem;
}
.log-arrow { transition: transform 0.2s; font-size: 0.8rem; color: var(--text-muted); }
.log-arrow.open { transform: rotate(180deg); }
.log-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.log-body.open { max-height: 350px; overflow-y: auto; }
.log-list { padding: 0 1.2rem 0.8rem; }
.log-entry {
  font-size: 0.78rem; font-family: 'SF Mono', 'Fira Code', monospace;
  padding: 0.2rem 0; border-bottom: 1px solid var(--bg); line-height: 1.5;
}
.log-entry .time { color: var(--text-light); margin-right: 0.5rem; }
.log-entry .cnum { color: var(--primary); font-weight: 600; margin-right: 0.4rem; }
.log-entry.error { color: var(--danger); }
.log-entry.warn { color: var(--warn); }
.log-entry.info { color: var(--text-muted); }

/* --- TOAST --- */
.toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 999; display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end; }
.toast { padding: 0.7rem 1.2rem; border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; box-shadow: var(--shadow-md); animation: slideIn 0.3s ease; max-width: 320px; }
.toast.ok { background: var(--success-light); color: #2D7A52; }
.toast.err { background: var(--danger-light); color: #B94A4A; }
.toast.info { background: #E8F0FE; color: #3566A5; }
@keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

@media (max-width: 640px) {
  .topbar { flex-direction: column; gap: 0.8rem; text-align: center; }
  .topbar-right { justify-content: center; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.8rem; }
  .card { padding: 1rem; }
  .modal { padding: 1.5rem; }
}

/* --- GUARD SETTINGS MODAL --- */
.guard-section { margin-bottom: 1.2rem; }
.guard-section-title {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.9rem;
  color: var(--text); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;
}

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.7rem 1rem; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 0.8rem;
}
.toggle-label { font-size: 0.9rem; font-weight: 500; }
.toggle-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.15rem; }

.toggle-switch {
  position: relative; width: 48px; height: 26px; cursor: pointer;
}
.toggle-switch input { display: none; }
.toggle-track {
  position: absolute; inset: 0; background: var(--border); border-radius: 13px;
  transition: background 0.2s;
}
.toggle-switch input:checked + .toggle-track { background: var(--success); }
.toggle-knob {
  position: absolute; top: 3px; left: 3px; width: 20px; height: 20px;
  background: white; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}
.toggle-switch input:checked ~ .toggle-knob { transform: translateX(22px); }

.tag-input-area {
  display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.6rem 0.8rem;
  background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm);
  min-height: 44px; align-items: center; cursor: text; transition: border-color 0.2s;
}
.tag-input-area:focus-within { border-color: var(--primary-light); }

.tag {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.25rem 0.6rem; background: var(--card); border: 1px solid var(--border);
  border-radius: 6px; font-size: 0.8rem; font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: nowrap;
}
.tag.code { background: #EDE9FE; border-color: #C4B5FD; color: #5B21B6; }
.tag.keyword { background: #FEF3C7; border-color: #FCD34D; color: #92400E; }
.tag-remove {
  cursor: pointer; font-size: 0.7rem; color: var(--text-light); line-height: 1;
  padding: 0 0.1rem; border-radius: 3px;
}
.tag-remove:hover { color: var(--danger); background: var(--danger-light); }

.tag-new-input {
  border: none; outline: none; background: transparent;
  font-family: 'Outfit', sans-serif; font-size: 0.85rem; color: var(--text);
  min-width: 80px; flex: 1;
}
.tag-new-input::placeholder { color: var(--text-light); }

.guard-hint {
  font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; line-height: 1.4;
}

.threshold-input {
  width: 60px; padding: 0.4rem 0.6rem; border: 2px solid var(--border);
  border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 0.9rem;
  text-align: center; outline: none; background: var(--bg);
  transition: border-color 0.2s;
}
.threshold-input:focus { border-color: var(--primary-light); }

/* --- BATCH GROUP --- */
.batch-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 0.4rem;
  max-height: 280px; overflow-y: auto; padding: 0.6rem;
  background: var(--bg); border: 2px solid var(--border); border-radius: var(--radius-sm);
}
.batch-item {
  display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.6rem;
  border-radius: 8px; cursor: pointer; transition: all 0.15s; user-select: none;
  font-size: 0.82rem; font-family: 'Nunito', sans-serif; font-weight: 600;
}
.batch-item:hover { background: var(--bg-warm); }
.batch-item.selected { background: var(--primary-light); color: white; }
.batch-item .batch-group-dot {
  font-size: 0.6rem; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-light); }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <span class="login-icon">&#x26A1;</span>
    <h1>Gemini Gateway</h1>
    <p>Gemini API OneClick</p>
    <input type="password" class="login-input" id="loginPwd" placeholder="输入密码" autocomplete="off">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
    <div class="login-error" id="loginErr"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">&#x26A1;</span>
      <div>
        <div class="topbar-title">Gemini Gateway</div>
        <div class="topbar-sub" id="topbarSub">Gemini API OneClick</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="stat-pill ok" id="statOk">0 正常</span>
      <span class="stat-pill warn" id="statBad">0 异常</span>
      <span class="stat-pill disabled" id="statOff">0 已禁用</span>
      <button class="btn-topbar" onclick="openBatchGroup()"><span class="icon">&#x1F3F7;</span> 批量分组</button>
      <button class="btn-topbar" id="refreshBtn" onclick="doRefresh()"><span class="icon">&#x21BB;</span> 刷新</button>
      <button class="btn-topbar" onclick="openGuardSettings()"><span class="icon">&#x2699;</span> 设置</button>
      <button class="btn-topbar" onclick="doLogout()"><span class="icon">&#x2192;</span> 退出</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>

  <!-- Log Panel (collapsible) -->
  <div class="log-panel">
    <div class="log-toggle" onclick="toggleLogs()">
      <div class="log-header">&#x1F4CB; 网关日志</div>
      <span class="log-arrow" id="logArrow">&#x25BC;</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-list" id="logList"></div>
    </div>
  </div>
</div>

<!-- DEPLOY MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="event.target===this&&closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">#1</div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label class="form-label">账号名称</label>
      <input type="text" class="form-input form-input-name" id="mName" placeholder="可选别名">
    </div>
    <div class="form-group">
      <label class="form-label">分组标签</label>
      <input type="text" class="form-input form-input-name" id="mGroup" placeholder="如 pro / was（留空 = 默认池）" spellcheck="false">
      <div class="guard-hint">同一分组名的容器共享轮询池，通过模型前缀路由（如 pro-gemini-2.0-flash）</div>
    </div>
    <div class="form-group">
      <label class="form-label">SECURE_1PSID</label>
      <input type="text" class="form-input" id="mPsid" placeholder="粘贴 cookie 值" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">SECURE_1PSIDTS</label>
      <input type="text" class="form-input" id="mPsidts" placeholder="粘贴 cookie 值" spellcheck="false">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="deployBtn" onclick="doDeploy()">部署</button>
    </div>
    <div class="modal-msg" id="modalMsg"></div>
  </div>
</div>

<!-- GUARD SETTINGS MODAL -->
<div class="modal-overlay" id="guardOverlay" onclick="event.target===this&&closeGuardSettings()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">&#x1F6E1; Channel Guard</div>
      <button class="modal-close" onclick="closeGuardSettings()">&#x2715;</button>
    </div>

    <div class="guard-section">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">自动禁用</div>
          <div class="toggle-desc">达到阈值后自动禁用容器</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="guardAutoDisable">
          <span class="toggle-track"></span>
          <span class="toggle-knob"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div>
          <div class="toggle-label">错误阈值</div>
          <div class="toggle-desc">连续多少次匹配错误后禁用</div>
        </div>
        <input type="number" class="threshold-input" id="guardThreshold" min="1" max="99" value="3">
      </div>
    </div>

    <div class="guard-section">
      <div class="guard-section-title">触发禁用的状态码</div>
      <div class="tag-input-area" id="codesArea" onclick="this.querySelector('input').focus()">
        <input type="text" class="tag-new-input" id="codesInput" placeholder="输入状态码 (如 503) + 回车">
      </div>
      <div class="guard-hint">仅这些 HTTP 状态码会触发计数。留空则忽略状态码。</div>
    </div>

    <div class="guard-section">
      <div class="guard-section-title">触发禁用的关键词</div>
      <div class="tag-input-area" id="keywordsArea" onclick="this.querySelector('input').focus()">
        <input type="text" class="tag-new-input" id="keywordsInput" placeholder="输入关键词 + 回车">
      </div>
      <div class="guard-hint">错误信息包含这些关键词时触发计数。不区分大小写。</div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeGuardSettings()">取消</button>
      <button class="btn btn-primary" id="guardSaveBtn" onclick="saveGuardSettings()">保存</button>
    </div>
    <div class="modal-msg" id="guardMsg"></div>
  </div>
</div>

<!-- BATCH GROUP MODAL -->
<div class="modal-overlay" id="batchGroupOverlay" onclick="event.target===this&&closeBatchGroup()">
  <div class="modal" style="width:min(540px,92vw)">
    <div class="modal-header">
      <div class="modal-title">&#x1F3F7; 批量分组</div>
      <button class="modal-close" onclick="closeBatchGroup()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label class="form-label">分组名称</label>
      <input type="text" class="form-input form-input-name" id="batchGroupName" placeholder="输入分组名（如 pro / was），留空 = 移除分组" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">选择容器</label>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.6rem;flex-wrap:wrap">
        <button class="card-btn" onclick="batchSelectAll()" style="font-size:0.78rem">全选</button>
        <button class="card-btn" onclick="batchSelectNone()" style="font-size:0.78rem">全不选</button>
        <button class="card-btn" onclick="batchSelectRange()" style="font-size:0.78rem">按范围选</button>
      </div>
      <div class="batch-grid" id="batchGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeBatchGroup()">取消</button>
      <button class="btn btn-primary" onclick="applyBatchGroup()">应用</button>
    </div>
    <div class="modal-msg" id="batchMsg"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toasts"></div>

<script>
const API = '/api';
let password = '';
let accounts = [];
let gatewayStatus = null;
let currentNum = null;
let names = {};
let autoRefreshTimer = null;

// ── Helpers ────────────────────────────────────────────────
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function gwUrl(path) {
  const sep = path.includes('?') ? '&' : '?';
  return password ? `${path}${sep}key=${encodeURIComponent(password)}` : path;
}

const GROUP_COLORS = ['#7C5CFC','#E06B5E','#2D9CDB','#27AE60','#F2994A','#9B51E0','#EB5757','#219653'];
function groupColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return GROUP_COLORS[Math.abs(h) % GROUP_COLORS.length];
}

function loadNames() {
  try { names = JSON.parse(localStorage.getItem('cm-names') || '{}'); } catch { names = {}; }
}

function saveName(num, name) {
  if (name) names[num] = name; else delete names[num];
  localStorage.setItem('cm-names', JSON.stringify(names));
  fetch(gwUrl(`/gateway/name/${num}`), {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: name || ''})
  }).catch(() => {});
}

// ── Login ──────────────────────────────────────────────────
function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  if (!pwd) { errEl.textContent = '请输入密码'; return; }
  errEl.textContent = '';

  fetch(API + '/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  })
  .then(async r => ({ ok: r.ok, status: r.status, data: await r.json().catch(() => ({})) }))
  .then(({ ok, status, data }) => {
    if (!ok) {
      if (status === 401) throw new Error('密码错误');
      throw new Error(data.detail || data.error || '登录失败');
    }
    password = pwd;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    loadNames();
    loadAll();
    startAutoRefresh();
  })
  .catch(e => {
    errEl.textContent = e.message || '连接失败';
  });
}

function doLogout() {
  password = '';
  stopAutoRefresh();
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginErr').textContent = '';
}

document.getElementById('loginPwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Data Loading ───────────────────────────────────────────
async function loadAll() {
  try {
    const [accountsRes, statusRes, logsRes] = await Promise.all([
      fetch(API + '/accounts'),
      fetch(gwUrl('/gateway/status')),
      fetch(gwUrl('/gateway/logs?limit=80')),
    ]);
    if (accountsRes.ok) {
      const data = await accountsRes.json();
      accounts = (data.accounts || []).sort((a, b) => Number(a.num) - Number(b.num));
    }
    if (statusRes.ok) {
      gatewayStatus = await statusRes.json();
    }
    if (logsRes.ok) {
      const logData = await logsRes.json();
      renderLogs(logData.logs || []);
    }
    renderGrid();
  } catch(e) {
    toast('加载失败: ' + e.message, 'err');
  }
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  try {
    await fetch(gwUrl('/gateway/refresh'), { method: 'POST' });
    await loadAll();
    toast('已刷新', 'info');
  } catch(e) {
    toast('刷新失败', 'err');
  } finally {
    btn.classList.remove('spinning');
  }
}

function startAutoRefresh() {
  stopAutoRefresh();
  autoRefreshTimer = setInterval(loadAll, 10000);
}

function stopAutoRefresh() {
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
}

// ── Render Grid ────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  let okCount = 0, badCount = 0, offCount = 0;

  const gwMap = {};
  if (gatewayStatus && gatewayStatus.containers) {
    gatewayStatus.containers.forEach(c => { gwMap[c.num] = c; });
  }

  const cards = accounts.map(a => {
    const num = a.num;
    const hasCookie = a.has_cookie;
    const gw = gwMap[num] || null;
    const name = (gw && gw.name) || names[num] || '';
    const preview = a.psid_preview || '';
    const group = (gw && gw.group) || '';
    const port = (gw && gw.port) || '';

    let cardClass, dotClass, stateLabel;
    if (gw && !gw.enabled) {
      cardClass = 'disabled-card'; dotClass = 'yellow'; stateLabel = '已禁用';
      offCount++;
    } else if (gw && gw.healthy) {
      cardClass = 'healthy'; dotClass = 'green'; stateLabel = '正常';
      okCount++;
    } else if (gw && !gw.healthy) {
      cardClass = 'unhealthy'; dotClass = 'red'; stateLabel = '异常';
      badCount++;
    } else if (hasCookie) {
      cardClass = 'healthy'; dotClass = 'grey'; stateLabel = '未检测';
      okCount++;
    } else {
      cardClass = 'no-cookie'; dotClass = 'grey'; stateLabel = '无 Cookie';
      badCount++;
    }

    let actionBtn = '';
    if (gw) {
      if (gw.enabled) {
        actionBtn = `<button class="card-btn disable" onclick="event.stopPropagation();toggleContainer(${num}, false)">禁用</button>`;
      } else {
        actionBtn = `<button class="card-btn enable" onclick="event.stopPropagation();toggleContainer(${num}, true)">启用</button>`;
      }
    }

    let statsLine = '';
    if (gw) {
      statsLine = `<div class="card-stats">${gw.total_requests} 请求 / ${gw.total_errors} 错误</div>`;
    }

    let errorLine = '';
    if (gw && gw.last_error) {
      errorLine = `<div class="card-error" title="${esc(gw.last_error)}">${esc(gw.last_error)}</div>`;
    }

    const groupBadge = group ? `<span class="group-badge" style="background:${groupColor(group)};color:#fff">${esc(group)}</span>` : '';
    const portLabel = port ? `<span class="card-port">:${port}</span>` : '';

    return `
      <div class="card ${cardClass}" onclick="openModal(${num})">
        <div class="card-header">
          <span class="card-num">#${num}</span>
          <span class="card-status ${dotClass}" title="${stateLabel}"></span>
        </div>
        <div class="card-meta">${portLabel}${groupBadge}</div>
        <div class="card-name">${esc(name || 'Container ' + num)}</div>
        <div class="card-preview ${preview ? '' : 'empty'}">
          ${preview ? esc(preview) : '无 Cookie'}
        </div>
        ${statsLine}
        ${errorLine}
        <div class="card-actions">${actionBtn}</div>
      </div>
    `;
  });

  grid.innerHTML = cards.join('');
  document.getElementById('statOk').textContent = okCount + ' 正常';
  document.getElementById('statBad').textContent = badCount + ' 异常';
  document.getElementById('statOff').textContent = offCount + ' 已禁用';

  const total = accounts.length;
  const avail = gatewayStatus ? gatewayStatus.available : okCount;
  document.getElementById('topbarSub').textContent = `${avail}/${total} 可用`;
}

// ── Gateway Actions ────────────────────────────────────────
async function toggleContainer(num, enable) {
  const action = enable ? 'enable' : 'disable';
  try {
    await fetch(gwUrl(`/gateway/${action}/${num}`), { method: 'POST' });
    toast(`#${num} 已${enable ? '启用' : '禁用'}`, 'ok');
    await loadAll();
  } catch(e) {
    toast('操作失败', 'err');
  }
}

// ── Logs ───────────────────────────────────────────────────
function renderLogs(logEntries) {
  const html = logEntries.map(l => {
    const cn = l.container !== null ? `<span class="cnum">#${l.container}</span>` : '';
    return `<div class="log-entry ${l.level}"><span class="time">${esc(l.time)}</span>${cn}${esc(l.message)}</div>`;
  }).join('');
  document.getElementById('logList').innerHTML = html || '<div class="log-entry info">暂无日志</div>';
}

function toggleLogs() {
  const body = document.getElementById('logBody');
  const arrow = document.getElementById('logArrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// ── Deploy Modal ───────────────────────────────────────────
function openModal(num) {
  currentNum = num;
  const gw = gatewayStatus && gatewayStatus.containers ? gatewayStatus.containers.find(c => c.num === num) : null;
  const displayName = (gw && gw.name) || names[num] || '';
  const group = (gw && gw.group) || '';
  document.getElementById('modalTitle').textContent = '#' + num + ' — gemini_api_account_' + num;
  document.getElementById('mName').value = displayName;
  document.getElementById('mGroup').value = group;
  document.getElementById('mPsid').value = '';
  document.getElementById('mPsidts').value = '';
  document.getElementById('modalMsg').textContent = '';
  document.getElementById('deployBtn').disabled = false;
  document.getElementById('deployBtn').textContent = '部署';
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('mPsid').focus(), 200);
}

function closeModal() {
  if (currentNum !== null) {
    const nameVal = document.getElementById('mName').value.trim();
    saveName(currentNum, nameVal);
    saveGroup(currentNum, document.getElementById('mGroup').value.trim());
    renderGrid();
  }
  document.getElementById('modalOverlay').classList.remove('active');
  currentNum = null;
}

function saveGroup(num, group) {
  fetch(gwUrl(`/gateway/group/${num}`), {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({group: group || ''})
  }).then(() => loadAll()).catch(() => {});
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('guardOverlay').classList.contains('active')) closeGuardSettings();
    else closeModal();
  }
});

function doDeploy() {
  const psid = document.getElementById('mPsid').value.trim();
  const psidts = document.getElementById('mPsidts').value.trim();
  const msg = document.getElementById('modalMsg');
  const btn = document.getElementById('deployBtn');

  if (!psid) {
    msg.className = 'modal-msg err';
    msg.textContent = 'SECURE_1PSID 不能为空';
    return;
  }

  const nameVal = document.getElementById('mName').value.trim();
  saveName(currentNum, nameVal);
  saveGroup(currentNum, document.getElementById('mGroup').value.trim());

  btn.disabled = true;
  btn.textContent = '部署中...';
  msg.className = 'modal-msg';
  msg.textContent = '';

  fetch(gwUrl(`/gateway/deploy/${currentNum}`), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ psid: psid, psidts: psidts })
  })
  .then(r => r.json().then(data => ({ ok: r.ok, data })))
  .then(({ ok, data }) => {
    if (ok) {
      msg.className = 'modal-msg ok';
      msg.textContent = '部署成功！';
      toast('#' + currentNum + ' 已部署', 'ok');
      setTimeout(() => { loadAll(); closeModal(); }, 1200);
    } else {
      throw new Error(data.detail || data.error || '部署失败');
    }
  })
  .catch(e => {
    msg.className = 'modal-msg err';
    msg.textContent = e.message;
    btn.disabled = false;
    btn.textContent = '部署';
    toast('#' + currentNum + ' 失败: ' + e.message, 'err');
  });
}

// ── Toast ──────────────────────────────────────────────────
function toast(text, type) {
  const container = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + (type || 'info');
  el.textContent = text;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(20px)';
    el.style.transition = 'all 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 2500);
}

loadNames();

// ── Guard Settings ──────────────────────────────────────────
let guardCodes = [];
let guardKeywords = [];

function renderTags(containerId, items, type) {
  const area = document.getElementById(containerId);
  area.querySelectorAll('.tag').forEach(t => t.remove());
  const input = area.querySelector('input');
  items.forEach((val, i) => {
    const tag = document.createElement('span');
    tag.className = 'tag ' + type;
    tag.innerHTML = esc(val) + ' <span class="tag-remove" onclick="removeTag(\'' + containerId + '\',' + i + ')">&times;</span>';
    area.insertBefore(tag, input);
  });
}

function removeTag(containerId, index) {
  if (containerId === 'codesArea') {
    guardCodes.splice(index, 1);
    renderTags('codesArea', guardCodes, 'code');
  } else {
    guardKeywords.splice(index, 1);
    renderTags('keywordsArea', guardKeywords, 'keyword');
  }
}

document.getElementById('codesInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = this.value.trim();
    if (val && /^\d{3}$/.test(val) && !guardCodes.includes(val)) {
      guardCodes.push(val);
      renderTags('codesArea', guardCodes, 'code');
    }
    this.value = '';
  } else if (e.key === 'Backspace' && !this.value && guardCodes.length) {
    guardCodes.pop();
    renderTags('codesArea', guardCodes, 'code');
  }
});

document.getElementById('keywordsInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    const val = this.value.trim();
    if (val && !guardKeywords.includes(val)) {
      guardKeywords.push(val);
      renderTags('keywordsArea', guardKeywords, 'keyword');
    }
    this.value = '';
  } else if (e.key === 'Backspace' && !this.value && guardKeywords.length) {
    guardKeywords.pop();
    renderTags('keywordsArea', guardKeywords, 'keyword');
  }
});

function openGuardSettings() {
  document.getElementById('guardMsg').textContent = '';
  document.getElementById('guardSaveBtn').disabled = true;
  document.getElementById('guardSaveBtn').textContent = '加载中...';
  document.getElementById('guardOverlay').classList.add('active');

  fetch(API + '/guard-settings')
    .then(r => r.json())
    .then(data => {
      const s = data.settings || {};
      document.getElementById('guardAutoDisable').checked = (s.GUARD_AUTO_DISABLE || 'true').toLowerCase() === 'true';
      document.getElementById('guardThreshold').value = s.GUARD_ERROR_THRESHOLD || '3';

      guardCodes = (s.GUARD_DISABLE_CODES || '').split(',').map(c => c.trim()).filter(c => c && /^\d+$/.test(c));
      guardKeywords = (s.GUARD_DISABLE_KEYWORDS || '').split(',').map(k => k.trim()).filter(Boolean);

      renderTags('codesArea', guardCodes, 'code');
      renderTags('keywordsArea', guardKeywords, 'keyword');

      document.getElementById('guardSaveBtn').disabled = false;
      document.getElementById('guardSaveBtn').textContent = '保存';
    })
    .catch(e => {
      document.getElementById('guardMsg').className = 'modal-msg err';
      document.getElementById('guardMsg').textContent = '加载设置失败';
      document.getElementById('guardSaveBtn').disabled = false;
      document.getElementById('guardSaveBtn').textContent = '保存';
    });
}

function closeGuardSettings() {
  document.getElementById('guardOverlay').classList.remove('active');
}

function saveGuardSettings() {
  const btn = document.getElementById('guardSaveBtn');
  const msg = document.getElementById('guardMsg');
  btn.disabled = true;
  btn.textContent = '保存中...';
  msg.textContent = '';

  const settings = {
    GUARD_AUTO_DISABLE: document.getElementById('guardAutoDisable').checked ? 'true' : 'false',
    GUARD_ERROR_THRESHOLD: document.getElementById('guardThreshold').value || '3',
    GUARD_DISABLE_CODES: guardCodes.join(','),
    GUARD_DISABLE_KEYWORDS: guardKeywords.join(','),
  };

  fetch(API + '/guard-settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: password, settings: settings })
  })
  .then(r => r.json().then(data => ({ ok: r.ok, data })))
  .then(({ ok, data }) => {
    if (ok) {
      msg.className = 'modal-msg ok';
      msg.textContent = '已保存！下次 guard 周期生效（约 1 分钟）';
      toast('Guard 设置已保存', 'ok');
      setTimeout(() => closeGuardSettings(), 1500);
    } else {
      throw new Error(data.detail || data.error || '保存失败');
    }
  })
  .catch(e => {
    msg.className = 'modal-msg err';
    msg.textContent = e.message;
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = '保存';
  });
}

// ── Batch Group ─────────────────────────────────────────────
let batchSelected = new Set();

function openBatchGroup() {
  batchSelected = new Set();
  document.getElementById('batchGroupName').value = '';
  document.getElementById('batchMsg').textContent = '';
  renderBatchGrid();
  document.getElementById('batchGroupOverlay').classList.add('active');
}

function closeBatchGroup() {
  document.getElementById('batchGroupOverlay').classList.remove('active');
}

function renderBatchGrid() {
  const grid = document.getElementById('batchGrid');
  const gwMap = {};
  if (gatewayStatus && gatewayStatus.containers) {
    gatewayStatus.containers.forEach(c => { gwMap[c.num] = c; });
  }
  grid.innerHTML = accounts.map(a => {
    const num = a.num;
    const gw = gwMap[num];
    const group = (gw && gw.group) || '';
    const sel = batchSelected.has(num) ? 'selected' : '';
    const dot = group ? `<span class="batch-group-dot" style="background:${groupColor(group)}"></span>` : '';
    const label = group ? `#${num} <span style="font-weight:400;font-size:0.72rem;opacity:0.7">${esc(group)}</span>` : `#${num}`;
    return `<div class="batch-item ${sel}" onclick="toggleBatchItem(${num})">${dot}${label}</div>`;
  }).join('');
}

function toggleBatchItem(num) {
  if (batchSelected.has(num)) batchSelected.delete(num);
  else batchSelected.add(num);
  renderBatchGrid();
}

function batchSelectAll() {
  accounts.forEach(a => batchSelected.add(a.num));
  renderBatchGrid();
}

function batchSelectNone() {
  batchSelected.clear();
  renderBatchGrid();
}

function batchSelectRange() {
  const input = prompt('输入范围，如 1-12');
  if (!input) return;
  const m = input.match(/^(\d+)\s*[-~到]\s*(\d+)$/);
  if (!m) { toast('格式错误，请输入如 1-12', 'err'); return; }
  const lo = parseInt(m[1]), hi = parseInt(m[2]);
  for (let i = lo; i <= hi; i++) {
    if (accounts.some(a => a.num === i)) batchSelected.add(i);
  }
  renderBatchGrid();
}

function applyBatchGroup() {
  if (batchSelected.size === 0) {
    document.getElementById('batchMsg').className = 'modal-msg err';
    document.getElementById('batchMsg').textContent = '请至少选择一个容器';
    return;
  }
  const group = document.getElementById('batchGroupName').value.trim().toLowerCase();
  const groups = {};
  batchSelected.forEach(num => { groups[String(num)] = group; });

  fetch(gwUrl('/gateway/batch-group'), {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({groups})
  })
  .then(r => r.json().then(data => ({ok: r.ok, data})))
  .then(({ok, data}) => {
    if (ok) {
      const action = group ? `已设为 [${group}]` : '已移除分组';
      toast(`${batchSelected.size} 个容器${action}`, 'ok');
      closeBatchGroup();
      loadAll();
    } else {
      throw new Error(data.detail || '操作失败');
    }
  })
  .catch(e => {
    document.getElementById('batchMsg').className = 'modal-msg err';
    document.getElementById('batchMsg').textContent = e.message;
  });
}

// ESC also closes batch group modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('batchGroupOverlay').classList.contains('active')) {
    closeBatchGroup();
  }
});

</script>
</body>
</html>
