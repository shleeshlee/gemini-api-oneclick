<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Gateway</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #FFF6EE; --bg-warm: #FFF0E3; --card: #FFFFFF; --card-hover: #FFF9F5;
  --primary: #FF8B7E; --primary-light: #FFB5AD; --primary-dark: #E06B5E;
  --accent: #FFD166; --success: #6EC89B; --success-light: #D4F0E1;
  --danger: #FF7B7B; --danger-light: #FFD4D4; --warn: #FFB347; --warn-light: #FFE4B5;
  --text: #3D3535; --text-muted: #9E8E8E; --text-light: #C4B0B0;
  --border: #F0E4DC; --shadow-sm: 0 2px 8px rgba(120,80,60,0.06);
  --shadow-md: 0 4px 20px rgba(120,80,60,0.08); --radius: 16px; --radius-sm: 10px;
}
html { font-size: 15px; }
body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(circle at 15% 25%, rgba(255,139,126,0.06) 0%, transparent 50%),
              radial-gradient(circle at 85% 75%, rgba(255,209,102,0.06) 0%, transparent 50%);
}

.app { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

/* Topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.8rem;
  margin-bottom: 1.5rem; padding: 1rem 1.5rem;
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
}
.topbar-left { display: flex; align-items: center; gap: 0.8rem; }
.topbar-logo { font-size: 1.8rem; }
.topbar-title { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1.3rem; }
.topbar-sub { font-size: 0.8rem; color: var(--text-muted); }
.topbar-right { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }

.stat-pill {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.35rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: 500;
}
.stat-pill.ok { background: var(--success-light); color: #2D7A52; }
.stat-pill.warn { background: var(--danger-light); color: #B94A4A; }
.stat-pill.disabled { background: var(--warn-light); color: #92610E; }

.btn-icon {
  width: 38px; height: 38px; border-radius: 10px; border: 2px solid var(--border);
  background: var(--card); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 1.1rem; transition: all 0.15s;
}
.btn-icon:hover { border-color: var(--primary-light); background: var(--bg-warm); }
.btn-icon.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }

/* Card */
.card {
  background: var(--card); border-radius: var(--radius); padding: 1rem;
  box-shadow: var(--shadow-sm); border: 2px solid transparent;
  transition: all 0.2s ease; position: relative; overflow: hidden;
}
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  transition: background 0.2s;
}
.card.available::after { background: linear-gradient(90deg, var(--success), var(--accent)); }
.card.unhealthy::after { background: linear-gradient(90deg, var(--danger), var(--primary-light)); }
.card.disabled::after { background: linear-gradient(90deg, var(--warn), var(--accent)); }
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
.card-num { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; }
.card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-dot.green { background: var(--success); box-shadow: 0 0 8px rgba(110,200,155,0.4); }
.card-dot.red { background: var(--danger); box-shadow: 0 0 8px rgba(255,123,123,0.4); animation: pulse 2s ease-in-out infinite; }
.card-dot.yellow { background: var(--warn); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

.card-name {
  font-size: 0.8rem; color: var(--text); margin-bottom: 0.3rem; cursor: pointer;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-name:hover { color: var(--primary); }
.card-stats { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.card-error {
  font-size: 0.7rem; color: var(--danger); background: var(--danger-light);
  padding: 0.25rem 0.5rem; border-radius: 6px; margin-top: 0.3rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-actions { margin-top: 0.5rem; }
.card-btn {
  font-size: 0.7rem; padding: 0.25rem 0.6rem; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer; font-family: 'Outfit'; transition: all 0.15s;
}
.card-btn:hover { background: var(--bg-warm); border-color: var(--primary-light); }
.card-btn.enable { border-color: var(--success); color: #2D7A52; }
.card-btn.disable { border-color: var(--danger); color: #B94A4A; }

/* Log panel */
.log-panel {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
  padding: 1rem 1.2rem; max-height: 350px; overflow-y: auto;
}
.log-header {
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 1rem;
  margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem;
}
.log-entry {
  font-size: 0.78rem; font-family: 'SF Mono', 'Fira Code', monospace;
  padding: 0.2rem 0; border-bottom: 1px solid var(--bg); line-height: 1.5;
}
.log-entry .time { color: var(--text-light); margin-right: 0.5rem; }
.log-entry .cnum { color: var(--primary); font-weight: 600; margin-right: 0.4rem; }
.log-entry.error { color: var(--danger); }
.log-entry.warn { color: var(--warn); }
.log-entry.info { color: var(--text-muted); }

/* API info */
.api-info {
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm);
  padding: 1rem 1.2rem; margin-bottom: 1.5rem;
}
.api-info code {
  background: var(--bg); padding: 0.2rem 0.5rem; border-radius: 6px;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85rem;
}

@media (max-width: 640px) {
  .topbar { flex-direction: column; text-align: center; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">&#x26A1;</span>
      <div>
        <div class="topbar-title">Gemini Gateway</div>
        <div class="topbar-sub" id="topSub">加载中...</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="stat-pill ok" id="statOk">-</span>
      <span class="stat-pill warn" id="statBad">-</span>
      <span class="stat-pill disabled" id="statOff">-</span>
      <button class="btn-icon" id="refreshBtn" onclick="doRefresh()" title="立即健康检查">&#x21BB;</button>
    </div>
  </div>

  <div class="api-info">
    统一入口: <code id="apiUrl">http://host:9800</code> &nbsp;
    聊天: <code>/v1/chat/completions</code> &nbsp;
    生图: <code>/v1/images/generations</code> &nbsp;
    模型: <code>/v1/models</code>
  </div>

  <div class="grid" id="grid"></div>

  <div class="log-panel">
    <div class="log-header">&#x1F4CB; 网关日志</div>
    <div id="logList"></div>
  </div>
</div>

<script>
const GW = '';
let autoRefresh = null;

async function loadStatus() {
  try {
    const [statusRes, logRes] = await Promise.all([
      fetch(GW + '/gateway/status'),
      fetch(GW + '/gateway/logs?limit=80'),
    ]);
    const status = await statusRes.json();
    const logData = await logRes.json();
    renderContainers(status);
    renderLogs(logData.logs);
  } catch(e) {
    document.getElementById('topSub').textContent = '连接失败';
  }
}

function renderContainers(status) {
  const cs = status.containers;
  let ok = 0, bad = 0, off = 0;

  const cards = cs.map(c => {
    let cls, dot;
    if (!c.enabled) { cls = 'disabled'; dot = 'yellow'; off++; }
    else if (c.healthy) { cls = 'available'; dot = 'green'; ok++; }
    else { cls = 'unhealthy'; dot = 'red'; bad++; }

    const btn = c.enabled
      ? `<button class="card-btn disable" onclick="toggleContainer(${c.num}, false)">禁用</button>`
      : `<button class="card-btn enable" onclick="toggleContainer(${c.num}, true)">启用</button>`;

    const nameDisplay = c.name ? esc(c.name) : '<i style="color:var(--text-light)">未命名</i>';

    return `
      <div class="card ${cls}">
        <div class="card-header">
          <span class="card-num">#${c.num}</span>
          <span class="card-dot ${dot}"></span>
        </div>
        <div class="card-name" onclick="editName(${c.num}, this)" title="点击编辑账号名称">${nameDisplay}</div>
        <div class="card-stats">${c.total_requests} 请求 / ${c.total_errors} 错误</div>
        ${c.last_error ? `<div class="card-error" title="${esc(c.last_error)}">${esc(c.last_error)}</div>` : ''}
        <div class="card-actions">${btn}</div>
      </div>`;
  });

  document.getElementById('grid').innerHTML = cards.join('');
  document.getElementById('statOk').textContent = ok + ' 正常';
  document.getElementById('statBad').textContent = bad + ' 异常';
  document.getElementById('statOff').textContent = off + ' 已禁用';
  document.getElementById('topSub').textContent = `${ok}/${cs.length} 可用`;
  document.getElementById('apiUrl').textContent = location.origin;
}

function renderLogs(logs) {
  const html = logs.map(l => {
    const cn = l.container !== null ? `<span class="cnum">#${l.container}</span>` : '';
    return `<div class="log-entry ${l.level}"><span class="time">${l.time}</span>${cn}${esc(l.message)}</div>`;
  }).join('');
  document.getElementById('logList').innerHTML = html || '<div class="log-entry info">暂无日志</div>';
}

async function editName(num, el) {
  const current = el.textContent.trim();
  const name = prompt(`容器 #${num} 的账号名称:`, current === '未命名' ? '' : current);
  if (name === null) return;
  await fetch(`${GW}/gateway/name/${num}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  loadStatus();
}

async function toggleContainer(num, enable) {
  const action = enable ? 'enable' : 'disable';
  await fetch(`${GW}/gateway/${action}/${num}`, { method: 'POST' });
  loadStatus();
}

async function doRefresh() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  await fetch(GW + '/gateway/refresh', { method: 'POST' });
  await loadStatus();
  btn.classList.remove('spinning');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadStatus();
autoRefresh = setInterval(loadStatus, 10000);
</script>
</body>
</html>
